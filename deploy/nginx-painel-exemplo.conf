# Exemplo: Nginx na VPS na frente do painel (Docker, porta 3080, network_mode: host).
# 1) DNS: A/AAAA de romulogdonadoni.com.br (e opcional www) -> IP desta máquina.
# 2) Nginx: copiar para /etc/nginx/sites-available/ (ajusta nomes e caminhos SSL).
# 3) Certificados: certbot certonly --nginx -d romulogdonadoni.com.br -d www.romulogdonadoni.com.br
# 4) No .env do projecto: PANEL_BASE_URL=https://romulogdonadoni.com.br
# 5) docker compose build panel && docker compose up -d panel
# 6) No config.cfg do MatchZy: matchzy_remote_log_url "https://romulogdonadoni.com.br/api/webhooks/matchzy-events"
#    (e o mesmo x-matchzy-secret do MATCHZY_WEBHOOK_SECRET). Depois: exec csgo/cfg/MatchZy/config.cfg

# Redirecionar www -> apex (opcional; ajusta se quiseres o contrário)
server {
    listen 80;
    listen [::]:80;
    server_name www.romulogdonadoni.com.br;
    return 301 https://romulogdonadoni.com.br$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name romulogdonadoni.com.br;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    return 301 https://romulogdonadoni.com.br$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name romulogdonadoni.com.br;

    # Certificados (Certbot geralmente preenche estes includes)
    ssl_certificate     /etc/letsencrypt/live/romulogdonadoni.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/romulogdonadoni.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 16m;

    location / {
        proxy_pass http://127.0.0.1:3080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
    }
}

# Aplicar: sudo cp deploy/nginx-romulogdonadoni.com.br.conf /etc/nginx/sites-available/romulogdonadoni.com.br
#          sudo ln -sf /etc/nginx/sites-available/romulogdonadoni.com.br /etc/nginx/sites-enabled/
# O Certbot (certbot --nginx) acrescenta o bloco listen 443 e os ssl_* no mesmo ficheiro.

server {
    listen 80;
    listen [::]:80;
    server_name romulogdonadoni.com.br www.romulogdonadoni.com.br;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
    }

    location / {
        proxy_pass http://127.0.0.1:3080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
    }

    client_max_body_size 16m;
}
